  <rect x="446" y="374" width="384" height="48" fill="#0c1a0c" stroke="#2ea04333" stroke-width="0.5" rx="4"/>
  <text x="458" y="390" font-family="monospace" font-size="10" fill="#3fb950">经验规则 (置信度 0.80)</text>
  <text x="458" y="406" font-family="monospace" font-size="10" fill="#8b949e">上次 auth.py 问题通过修复 roles.py 上游解决</text>
  <text x="458" y="418" font-family="monospace" font-size="10" fill="#8b949e">→ 优先检查调用链上游接口定义</text>

  <text x="446" y="450" font-family="monospace" font-size="12" fill="#7ee787">$</text>
  <text x="462" y="450" font-family="monospace" font-size="12" fill="#484f58">_</text>

