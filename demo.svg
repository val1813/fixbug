  <text x="446" y="340" font-family="monospace" font-size="12" fill="#3fb950">✓   完成，结果已告知 AI</text>
  <text x="446" y="358" font-family="monospace" font-size="11" fill="#484f58">    详情见 .fixbug/current_advice.md</text>

